# Prefix: Ctrl-a (easier to reach than default Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Allow image passthrough (for kitty/sixel graphics protocols)
set -g allow-passthrough on

# Mouse support
set -g mouse on

# Copy mode: vim keys, yank to system clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Start windows/panes at 1 instead of 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback
set -g history-limit 50000

# Extended keys (pass Shift-Enter etc. to applications)
set -g extended-keys on
set -as terminal-features ',xterm-256color:extkeys'
bind-key -n S-Enter send-keys Escape "[13;2u"

# Reduce escape delay (important for nvim)
set -sg escape-time 10

# Focus events (needed for nvim autoread)
set -g focus-events on

# --- Pane splitting ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- Pane navigation (no prefix needed) ---
bind -n C-j select-pane -t :.+
bind -n C-k select-pane -t :.-

# --- Preset layouts ---
# Left 1/3, right 2/3
bind e run-shell "tmux select-layout even-horizontal && tmux resize-pane -t 1 -x $(( #{window_width} / 3 ))"
# Equal split
bind r select-layout even-horizontal
# Left 2/3, right 1/3
bind t run-shell "tmux select-layout even-horizontal && tmux resize-pane -t 1 -x $(( #{window_width} * 2 / 3 ))"
# Zoom toggle
bind o resize-pane -Z
# Cycle layouts
bind L next-layout

# --- Pane navigation (prefix + vim-style) ---
bind h select-pane -L
bind l select-pane -R
bind j select-pane -D
bind k select-pane -U

# --- Resize panes (prefix + vim-style with repeat) ---
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3

# --- Pane border ---
set -g pane-border-indicators arrows

# --- Status bar ---
set -g status-style "bg=#0e1219,fg=#a9b1d6"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#565f89] %H:%M "
set -g window-status-current-style "fg=#7aa2f7,bold"
set -g window-status-style "fg=#545c7e"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
